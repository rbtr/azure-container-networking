apiVersion: v1
data:
  plugins.conf: |
    [PLUGINS]
        Path /out_azure_app_insights.so
  fluent-bit.conf: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        Plugins_File /fluent-bit/etc/conf/plugins.conf
        HTTP_Server Off
        Health_Check Off

    [INPUT]
        Name tail
        Tag cns.*
        Exclude_path /var/log/containers/*fluent*.log
        Path /var/log/containers/*cns-container*.log
        multiline.parser docker, cri
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        db fluent-bit-cns-db
        read_from_head true

    [INPUT]
        Name tail
        Tag cilium.*
        Exclude_path /var/log/containers/*fluent*.log
        Path /var/log/containers/*cilium*.log
        multiline.parser docker, cri
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        db fluent-bit-db
        read_from_head true

    [FILTER]
        Name kubernetes
        Match cns.*
        Kube_Tag_Prefix cns.var.log.containers.
        Merge_Log Off
        Keep_Log On
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off
        Buffer_Size 128KB
        Use_tag_for_meta On

    [FILTER]
        Name kubernetes
        Match cilium.*
        Kube_Tag_Prefix cilium.var.log.containers.
        Merge_Log Off
        Keep_Log On
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off
        Buffer_Size 128KB
        Use_tag_for_meta On

    [OUTPUT]
        Name                        azure_app_insights
        id                          cns
        debug                       true
        imds                        true
        instrumentation_key         2f6ea7db-059d-46bf-905d-4b8724b628b6
        Match                       cns.*

    [OUTPUT]
        Name                        azure_app_insights
        id                          cilium
        debug                       true
        imds                        true
        instrumentation_key         0b069f84-690d-4290-9703-747af9a35cd8
        Match                       cilium.*

kind: ConfigMap
metadata:
  name: cilium-fluent-bit
  namespace: kube-system
