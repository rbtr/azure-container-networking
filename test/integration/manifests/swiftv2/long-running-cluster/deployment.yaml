apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .DeploymentName }}
  namespace: {{ .Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .DeploymentName }}
  template:
    metadata:
      labels:
        app: {{ .DeploymentName }}
        kubernetes.azure.com/pod-network-instance: {{ .PNIName }}
        kubernetes.azure.com/pod-network: {{ .PNName }}
      annotations:
        acn-test/created-at: "{{ .CreatedAt }}"
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .NodeName }}
      tolerations:
      - key: "acn-test/zone-pool"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: net-debugger
        image: {{ .Image }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Pod Network Diagnostics started on $(hostname)"
            echo "Pod IP: $(hostname -i)"
            echo "Starting TCP listener on port 8080"

            # Start netcat listener that responds to connections
            while true; do
              echo "TCP Connection Success from $(hostname) at $(date)" | nc -l -p 8080
            done
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 600Mi
            acn.azure.com/vnet-nic: "1"
          requests:
            cpu: 300m
            memory: 600Mi
            acn.azure.com/vnet-nic: "1"
        securityContext:
          privileged: true
      restartPolicy: Always
