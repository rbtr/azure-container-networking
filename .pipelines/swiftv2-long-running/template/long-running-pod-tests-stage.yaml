parameters:
  - name: location
    type: string
  - name: subscriptionId
    type: string
  - name: stageLabel
    type: string
  - name: rgName
    type: string
  - name: zone
    type: string
  - name: vmSkuHighNIC
    type: string
    default: "Standard_D16s_v3"
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: LongRunningPodTests_Z${{ parameters.zone }}_${{ replace(parameters.stageLabel, '-', '_') }}
    displayName: "Long-Running Pod Tests - Zone ${{ parameters.zone }} (${{ parameters.stageLabel }})"
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(eq(variables.isAllowedRun, true), not(failed()))
    jobs:
      # Ensure the zone-specific node pool exists (idempotent, isolated per zone)
      - job: EnsureNodePool_Z${{ parameters.zone }}
        displayName: "Ensure zone ${{ parameters.zone }} node pool exists"
        steps:
          - checkout: self
            displayName: "Checkout azure-container-networking"
          - task: AzureCLI@2
            displayName: "Ensure per-zone high-NIC node pool (zone ${{ parameters.zone }})"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/ensure_zone_nodepools.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.rgName }}
                aks-1
                ${{ parameters.vmSkuHighNIC }}
                "${{ parameters.zone }}"
                7

      # Setup: Get kubeconfig
      - job: SetupKubeconfig
        displayName: "Setup Kubeconfig Files"
        dependsOn: EnsureNodePool_Z${{ parameters.zone }}
        steps:
          - task: AzureCLI@2
            displayName: "Generate and verify kubeconfig files"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                mkdir -p $(Pipeline.Workspace)/kubeconfigs

                echo "==> Setting up kubeconfig for cluster aks-1"
                az aks get-credentials \
                  --resource-group ${{ parameters.rgName }} \
                  --name aks-1 \
                  --subscription ${{ parameters.subscriptionId }} \
                  --file $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  --overwrite-existing \
                  --admin

                echo "==> Verifying cluster aks-1 connectivity"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig get nodes

                ZONE="${{ parameters.zone }}"
                if [ "$ZONE" = "0" ]; then
                  echo "==> Confirming generic (non-zonal) longrunning nodes exist"
                  kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig get nodes \
                    -l "longrunning-zone-pool=true,agentpool=npz0" \
                    -o custom-columns='NAME:.metadata.name,ZONE:.metadata.labels.topology\.kubernetes\.io/zone,POOL:.metadata.labels.agentpool'
                else
                  echo "==> Confirming zone ${{ parameters.zone }} nodes exist"
                  kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig get nodes \
                    -l "topology.kubernetes.io/zone=${{ parameters.location }}-${{ parameters.zone }},longrunning-zone-pool=true" \
                    -o custom-columns='NAME:.metadata.name,ZONE:.metadata.labels.topology\.kubernetes\.io/zone,POOL:.metadata.labels.agentpool'
                fi

          - task: PublishPipelineArtifact@1
            displayName: "Publish kubeconfig files"
            inputs:
              targetPath: $(Pipeline.Workspace)/kubeconfigs
              artifactName: kubeconfigs-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}
              publishLocation: pipeline

      # Setup: Build metrics binary
      - job: BuildMetricsBinary
        displayName: "Build Metrics Binary"
        steps:
          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"

          - task: Bash@3
            displayName: "Build persistent-cluster-metrics binary"
            inputs:
              targetType: 'inline'
              script: |
                make -C src/dnc persistent-cluster-metrics-binary
                chmod +x src/dnc/output/linux_amd64/metrics/persistent-cluster-metrics

          - task: PublishPipelineArtifact@1
            displayName: "Publish metrics binary and config"
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/src/dnc'
              artifactName: 'persistent-cluster-metrics-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}'
              publishLocation: 'pipeline'

      # Job 1: Rotating pods (delete expired, create new, ensure 1 rotation per hour)
      - job: RotatingPods_Z${{ parameters.zone }}
        displayName: "Zone ${{ parameters.zone }}: Rotating Pods (6h lifetime)"
        dependsOn:
          - SetupKubeconfig
          - BuildMetricsBinary
        timeoutInMinutes: 60
        steps:
          - checkout: self
            displayName: "Checkout azure-container-networking"

          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"

          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: DownloadPipelineArtifact@2
            displayName: "Download metrics binary"
            inputs:
              artifact: 'persistent-cluster-metrics-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}'
              path: '$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc'

          - task: Bash@3
            displayName: "Make metrics binary executable"
            inputs:
              targetType: 'inline'
              script: |
                chmod +x $(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc/output/linux_amd64/metrics/persistent-cluster-metrics

          - task: AzureCLI@2
            displayName: "Run Rotating Pod Test (Zone ${{ parameters.zone }})"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Managing rotating pods in zone ${{ parameters.zone }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}"
                export WORKLOAD_TYPE="swiftv2-linux"
                export ZONE="${{ parameters.zone }}"
                export LOCATION="${{ parameters.location }}"

                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"

                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster

                if go test -v -timeout=45m -tags=longrunning_rotating_test; then
                  echo "RotatingPods Zone ${{ parameters.zone }} PASSED"
                  # TODO: Re-enable with a dedicated long-running metric name once persistent-cluster-metrics
                  # in Networking-Aquarius is updated to support it. Currently disabled to avoid polluting
                  # PersistentClusterTestsSucceeded/Failed alerts with long-running test noise.
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-rotating-z${{ parameters.zone }}" --test-scenario "Rotating pod management zone ${{ parameters.zone }}"
                else
                  echo "RotatingPods Zone ${{ parameters.zone }} FAILED"
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-rotating-z${{ parameters.zone }}" --test-scenario "Rotating pod management zone ${{ parameters.zone }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      # Job 2: Always-on DaemonSet pod (validate always-on pod in this zone)
      - job: AlwaysOnPods_Z${{ parameters.zone }}
        displayName: "Zone ${{ parameters.zone }}: Always-On DaemonSet pod check"
        dependsOn:
          - SetupKubeconfig
          - BuildMetricsBinary
        timeoutInMinutes: 60
        steps:
          - checkout: self
            displayName: "Checkout azure-container-networking"

          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"

          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: DownloadPipelineArtifact@2
            displayName: "Download metrics binary"
            inputs:
              artifact: 'persistent-cluster-metrics-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}'
              path: '$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc'

          - task: Bash@3
            displayName: "Make metrics binary executable"
            inputs:
              targetType: 'inline'
              script: |
                chmod +x $(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc/output/linux_amd64/metrics/persistent-cluster-metrics

          - task: AzureCLI@2
            displayName: "Run Always-On Pod Test (Zone ${{ parameters.zone }})"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Ensuring always-on pods in zone ${{ parameters.zone }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}"
                export WORKLOAD_TYPE="swiftv2-linux"
                export ZONE="${{ parameters.zone }}"
                export LOCATION="${{ parameters.location }}"

                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"

                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster

                if go test -v -timeout=45m -tags=longrunning_alwayson_test; then
                  echo "AlwaysOnPods Zone ${{ parameters.zone }} PASSED"
                  # TODO: Re-enable with a dedicated long-running metric name once persistent-cluster-metrics
                  # in Networking-Aquarius is updated to support it.
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-alwayson-z${{ parameters.zone }}" --test-scenario "Always-on pod management zone ${{ parameters.zone }}"
                else
                  echo "AlwaysOnPods Zone ${{ parameters.zone }} FAILED"
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-alwayson-z${{ parameters.zone }}" --test-scenario "Always-on pod management zone ${{ parameters.zone }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      # Job 3: Connectivity test between rotating and always-on pods in this zone
      - job: LongRunningConnectivityTest_Z${{ parameters.zone }}
        displayName: "Zone ${{ parameters.zone }}: Connectivity Test"
        dependsOn:
          - SetupKubeconfig
          - BuildMetricsBinary
          - RotatingPods_Z${{ parameters.zone }}
          - AlwaysOnPods_Z${{ parameters.zone }}
        condition: and(succeeded('SetupKubeconfig', 'BuildMetricsBinary'), succeeded('RotatingPods_Z${{ parameters.zone }}'), succeeded('AlwaysOnPods_Z${{ parameters.zone }}'))
        timeoutInMinutes: 30
        steps:
          - checkout: self
            displayName: "Checkout azure-container-networking"

          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"

          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: DownloadPipelineArtifact@2
            displayName: "Download metrics binary"
            inputs:
              artifact: 'persistent-cluster-metrics-longrunning-z${{ parameters.zone }}-${{ parameters.stageLabel }}'
              path: '$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc'

          - task: Bash@3
            displayName: "Make metrics binary executable"
            inputs:
              targetType: 'inline'
              script: |
                chmod +x $(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc/output/linux_amd64/metrics/persistent-cluster-metrics

          - task: AzureCLI@2
            displayName: "Run Connectivity Tests (Zone ${{ parameters.zone }})"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running connectivity tests in zone ${{ parameters.zone }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}"
                export WORKLOAD_TYPE="swiftv2-linux"
                export ZONE="${{ parameters.zone }}"
                export LOCATION="${{ parameters.location }}"

                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"

                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster

                if go test -v -timeout=20m -tags=longrunning_connectivity_test; then
                  echo "Connectivity Zone ${{ parameters.zone }} PASSED"
                  # TODO: Re-enable with a dedicated long-running metric name once persistent-cluster-metrics
                  # in Networking-Aquarius is updated to support it.
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-connectivity-z${{ parameters.zone }}" --test-scenario "Long-running connectivity zone ${{ parameters.zone }}"
                else
                  echo "Connectivity Zone ${{ parameters.zone }} FAILED"
                  # cd $metrics_dir
                  # output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "longrunning-connectivity-z${{ parameters.zone }}" --test-scenario "Long-running connectivity zone ${{ parameters.zone }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs
