parameters:
  name: ""
  clusterName: ""
  scaleup: ""

steps:
  - bash: |
      echo $UID
      sudo rm -rf $(System.DefaultWorkingDirectory)/*
    displayName: "Set up OS environment"

  - checkout: self

  - bash: |
      go version
      go env
      mkdir -p '$(GOBIN)'
      mkdir -p '$(GOPATH)/pkg'
      mkdir -p '$(modulePath)'
      echo '##vso[task.prependpath]$(GOBIN)'
      echo '##vso[task.prependpath]$(GOROOT)/bin'
    name: "GoEnv"
    displayName: "Set up the Go environment"

  - task: AzureCLI@2
    displayName: "Update IP configs"
    inputs:
      azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
      scriptLocation: "inlineScript"
      scriptType: "bash"
      addSpnToEnvironment: true
      inlineScript: |
        set -e
        clusterName=${{ parameters.clusterName }}
        SCALE_UP=${{ parameters.scaleup }}
        if [ -z "$SCALE_UP" ]; then
          SCALE_UP=32
        fi
        SECONDARY_IP_COUNT=$((SCALE_UP * 2)) \
        RESOURCE_GROUP="MC_${clusterName}_${clusterName}_$(REGION_AKS_CLUSTER_TEST)" \
        go run $(Build.SourcesDirectory)/test/integration/cilium-nodesubnet/ipconfigupdate.go

  - task: KubectlInstaller@0
    inputs:
      kubectlVersion: latest

  - template: ../../templates/cilium-cli.yaml

  - task: AzureCLI@2
    inputs:
      azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
      scriptLocation: "inlineScript"
      scriptType: "bash"
      addSpnToEnvironment: true
      inlineScript: |
        set -e
        make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}
        ls -lah
        pwd
        kubectl cluster-info
        kubectl get po -owide -A
        # makefile manages cilium version
        unset DIR
        unset CILIUM_VERSION_TAG
        make -C ./hack/aks deploy-cilium
        export CILIUM_LOG_COLLECTOR_IMAGE_REGISTRY=acnpublic.azurecr.io
        export CILIUM_LOG_COLLECTOR_VERSION_TAG=$(make cilium-log-collector-version)
        make -C ./hack/aks add-cilium-log-collector
        kubectl get po -owide -A
        kubectl get crd -A
    name: "installCilium"
    displayName: "Install Cilium"
    retryCountOnTaskFailure: 2

  - script: |
      echo "Start Nodesubnet E2E Tests"
      kubectl get po -owide -A
      # These vars may be set by the job template via setup stage outputs and are available here as environment variables in child scripts.

      IPAM=${AZURE_IPAM_VERSION:-$(make azure-ipam-version)}
      CNS=${CNS_VERSION:-$(make cns-version)}
      sudo -E env "PATH=$PATH" make test-load SCALE_UP=32 OS_TYPE=linux VALIDATE_STATEFILE=true INSTALL_CNS=true INSTALL_CNS_NODESUBNET=true AZURE_IPAM_VERSION=${IPAM} CNS_VERSION=${CNS} CLEANUP=true
    retryCountOnTaskFailure: 3
    name: "nodeSubnetE2ETests"
    displayName: "Run NodeSubnet E2E"

  - template: ../../templates/cilium-tests.yaml
    parameters:
      clusterName: ${{ parameters.clusterName }}
      scaleup: ${{ parameters.scaleup }}
