apiVersion: v1
kind: ConfigMap
metadata:
  name: cns-static-pod-files
  namespace: kube-system
data:
  # Will be populated at apply time from the test-staticpod/ files via kubectl create cm
  azure-cns.yaml: ""
  cns_config.json: ""
  kubeconfig.yaml: ""
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cns-static-pod-writer
  namespace: kube-system
  labels:
    app: cns-static-pod-writer
spec:
  selector:
    matchLabels:
      app: cns-static-pod-writer
  template:
    metadata:
      labels:
        app: cns-static-pod-writer
    spec:
      priorityClassName: system-node-critical
      hostNetwork: true
      tolerations:
        - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: writer
          image: mcr.microsoft.com/cbl-mariner/base/core:2.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - /bin/bash
            - -c
            - |
              set -eu
              mkdir -p /host/etc/kubernetes/manifests /host/var/lib/azure-cns /host/var/lib/azure-cns-config
              cp /files/cns_config.json /host/var/lib/azure-cns-config/cns_config.json
              chmod 644 /host/var/lib/azure-cns-config/cns_config.json
              cp /files/kubeconfig.yaml /host/var/lib/azure-cns/kubeconfig.yaml
              chmod 600 /host/var/lib/azure-cns/kubeconfig.yaml
              # Write manifest LAST so kubelet's fsnotify only fires once kubeconfig+config are on disk
              cp /files/azure-cns.yaml /host/etc/kubernetes/manifests/azure-cns.yaml
              chmod 600 /host/etc/kubernetes/manifests/azure-cns.yaml
              echo "wrote azure-cns static pod stack on $(hostname)"
              # Stay alive so the daemonset doesn't crash-loop (and so we can re-write on restart)
              while true; do sleep 3600; done
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: files
              mountPath: /files
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: files
          configMap:
            name: cns-static-pod-files
