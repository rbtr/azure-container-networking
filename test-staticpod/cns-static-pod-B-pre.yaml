apiVersion: v1
kind: Pod
metadata:
  name: azure-cns-static
  namespace: kube-system
  labels:
    k8s-app: azure-cns
  annotations:
    kubernetes.io/config.source: "file"
spec:
  priorityClassName: system-node-critical
  hostNetwork: true
  # Mirror pods (created from static pod manifests) cannot reference a
  # ServiceAccount per kubelet policy. Use a hostPath kubeconfig instead;
  # the same kubeconfig CNS needs is dropped onto the node by the CSE
  # extension that places this manifest.
  automountServiceAccountToken: false
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - operator: Exists
      effect: NoExecute
    - operator: Exists
      effect: NoSchedule
  containers:
    - name: cns-container
      # Pre-baked in the AKS BYOCNI VHD (per P3); should be "already present"
      image: mcr.microsoft.com/containernetworking/azure-cns:v1.8.6-0
      imagePullPolicy: IfNotPresent
      args:
        - "-c"
        - "tcp://$(CNSIpAddress):$(CNSPort)"
        - "-t"
        - "$(CNSLogTarget)"
      securityContext:
        capabilities:
          drop:
            - ALL
          add:
            - NET_ADMIN
            - NET_RAW
      volumeMounts:
        - name: log
          mountPath: /var/log
        - name: cns-state
          mountPath: /var/lib/azure-network
        - name: azure-endpoints
          mountPath: /var/run/azure-cns/
        - name: cns-config
          mountPath: /etc/azure-cns
        - name: cns-kubeconfig
          mountPath: /var/lib/azure-cns
          readOnly: true
        - name: cni-bin
          mountPath: /opt/cni/bin
        - name: azure-vnet
          mountPath: /var/run/azure-vnet
        - name: legacy-cni-state
          mountPath: /var/run/azure-vnet.json
        - name: xtables-lock
          mountPath: /run/xtables.lock
        - name: cni-conflist
          mountPath: /etc/cni/net.d
      ports:
        - containerPort: 10090
        - containerPort: 9090
          name: metrics
          protocol: TCP
      env:
        - name: CNSIpAddress
          value: "127.0.0.1"
        - name: CNSPort
          value: "10090"
        - name: CNSLogTarget
          value: "stdoutfile"
        - name: CNS_CONFIGURATION_PATH
          value: /etc/azure-cns/cns_config.json
        - name: KUBECONFIG
          value: /var/lib/azure-cns/kubeconfig.yaml
        - name: NODENAME
          valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: spec.nodeName
  volumes:
    - name: cni-conflist
      hostPath:
        path: /etc/cni/net.d
        type: Directory
    - name: azure-endpoints
      hostPath:
        path: /var/run/azure-cns/
        type: DirectoryOrCreate
    - name: log
      hostPath:
        path: /var/log
        type: Directory
    - name: cns-state
      hostPath:
        path: /var/lib/azure-network
        type: DirectoryOrCreate
    - name: cni-bin
      hostPath:
        path: /opt/cni/bin
        type: Directory
    - name: azure-vnet
      hostPath:
        path: /var/run/azure-vnet
        type: DirectoryOrCreate
    - name: legacy-cni-state
      hostPath:
        path: /var/run/azure-vnet.json
        type: FileOrCreate
    # cns_config.json dropped by CSE; not from a ConfigMap because static
    # pods can't depend on namespace objects without an SA relationship.
    - name: cns-config
      hostPath:
        path: /var/lib/azure-cns-config
        type: DirectoryOrCreate
    # kubeconfig dropped by CSE; gives CNS its identity for talking to apiserver
    - name: cns-kubeconfig
      hostPath:
        path: /var/lib/azure-cns
        type: DirectoryOrCreate
    - name: xtables-lock
      hostPath:
        path: /run/xtables.lock
        type: File
